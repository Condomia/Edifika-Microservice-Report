spring.application.name=edifika-microservice-report

server.port=${PORT:8088}

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/edifika_report_db}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

external.services.api-gateway-url=${API_GATEWAY_URL:http://localhost:8080}

spring.docker.compose.enabled=false
spring.main.web-application-type=servlet
spring.main.allow-bean-definition-overriding=true

jwt.secret=${JWT_SECRET:edifika-secret-key-must-be-at-least-32-characters-long}
jwt.expiration.days=${JWT_EXPIRATION_DAYS:365}